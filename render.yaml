# Render Blueprint — one-click deploy
# https://render.com/docs/blueprint-spec
#
# ┌──────────────────────────────────────────────────────────┐
# │  SETUP (do these BEFORE clicking "New Blueprint"):       │
# │                                                          │
# │  1. Create a free Neon Postgres DB:                      │
# │     https://neon.tech → New Project → copy the           │
# │     "connection string" (starts with postgresql://)      │
# │                                                          │
# │  2. Create a free Upstash Redis:                         │
# │     https://upstash.com → New Database → copy the        │
# │     "Redis URL" (starts with redis:// or rediss://)      │
# │                                                          │
# │  AFTER FIRST DEPLOY:                                     │
# │                                                          │
# │  3. In Render dashboard → udl-api → Environment:         │
# │     - DATABASE_URL = your Neon connection string          │
# │     - REDIS_URL    = your Upstash Redis URL               │
# │     - CORS_ORIGINS = https://udl-frontend.onrender.com   │
# │       (use your actual frontend URL from step 5)         │
# │                                                          │
# │  4. In Render dashboard → udl-frontend → Environment:    │
# │     - VITE_API_URL = https://udl-api.onrender.com        │
# │       (use your actual backend URL from step 3)          │
# │                                                          │
# │  5. Redeploy BOTH services after setting env vars.       │
# │     Frontend MUST be rebuilt for VITE_API_URL to work.   │
# └──────────────────────────────────────────────────────────┘

services:
  # ── Backend API ──────────────────────────────────────────
  - type: web
    name: udl-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a random value
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false  # REQUIRED — paste your Neon connection string (postgresql://...)
      - key: REDIS_URL
        sync: false  # REQUIRED — paste your Upstash Redis URL (redis://...)
      - key: CORS_ORIGINS
        sync: false  # REQUIRED — your frontend URL, e.g. https://udl-frontend.onrender.com
      - key: DISABLE_BACKGROUND_JOBS
        value: "false"  # Jobs run in-process on free tier (single instance)
      - key: SENTRY_DSN
        value: ""

  # ── Frontend (Static Site — CDN-backed, never sleeps) ───
  - type: web
    name: udl-frontend
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    rootDir: ./frontend
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      # Prevent browsers from caching index.html — ensures users get
      # new JS bundles after each deploy instead of a stale SPA shell.
      - path: /index.html
        name: Cache-Control
        value: no-cache, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      # SPA fallback — all paths serve index.html
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false  # REQUIRED — your backend URL, e.g. https://udl-api.onrender.com
