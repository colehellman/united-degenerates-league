name: Sync Docs

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/app/api/**'
      - 'backend/app/models/**'
      - 'backend/app/main.py'
      - 'frontend/src/pages/**'
      - 'frontend/src/components/**'
      - 'scripts/sync-docs.py'

permissions:
  contents: write

jobs:
  sync-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run doc sync
        run: python scripts/sync-docs.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet README.md CLAUDE.md && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit updated docs
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md CLAUDE.md
          git commit -m "docs: auto-sync documentation with codebase"
          git push

      - name: Retrigger CI on the new commit
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.head_ref }}
        run: |
          gh workflow run ci.yml --ref "$BRANCH"
